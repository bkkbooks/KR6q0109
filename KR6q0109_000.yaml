front:
  text: 楞伽師資記兩目中各出一五色光舍利將知大師成道已久也大唐中宗孝帝景龍二年勅召入西京便於東都廣開禪法淨覺當眾歸依一心承事兩京來往參覲向有餘年所呈心地尋已決了祖忍大師授記之安州有一箇即我大和上是也乃刑類凡僧證同佛地帝師國寶宇內歸依淨覺宿世有緣親蒙指授始知方寸之內具足真如昔所未聞今乃知耳真如無相知亦無知無知之知豈離知也無相之相豈離相也人法皆如說亦如也如自無說說則非如如本無知知非如矣起信論云心真如是即是一法界總相法門體所謂心性不生不滅一切法唯因妄念而有差別若離心念別無境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如有真自體相者凡夫聲聞緣覺菩薩諸佛無有增減非有際生非後際滅畢竟常恒從本性自滿足一切功德自體有大智惠光明義故自性清淨心楞伽經云自心現境界隨類普現於五法云何是五法名相忘想正智如如是故眾物無名心作名諸相無相由心作相但自無心則無名相故曰正智如如法句經云參羅及萬像一法之所印余乃潛神玄默養性幽巖獨守淨心抱一冲谷聊寄一序托悟在中同我道流願知心耳真如妙體不離生死之中聖道玄微還在色身之內色身清淨寄住煩惱之間生死性真權在涅槃之處故知眾生與佛性本來共同以水況氷體何有異氷由質礙喻眾生繫縛水性虛通等佛性之圓淨無法可得無相可求善法尚遣捨之生死故應遠離維摩經云欲得淨度當淨其心隨其心淨則佛土淨也身雖為之本識見還有淺深深見者是歷劫清淨薰修之因一發道心乃至成佛亦不退也淺識者是現今新學初離歡喜為積生已來有誹謗邪見之因無正信習道之力根則不定後還退敗也覆尋生死只為攀緣返照攀緣之心心性本來清淨之處染著無染是淨無繫是脫染即生死之因淨即菩提之果大分深義究竟是空至道無言言則乖至雖以性擬本無本可稱空自無言非心行處聖心微隱絕解絕知大覺寒寒無言無說法華經云諸法寂滅相不可以言宣也無法可說無心可言自性空閑返歸於本本者道也道性悾恫而無際放曠清微壞大千以寂寥通古今而性淨即上下周圓遍清淨是淨佛國土也是知一毫之內具足三千大千一塵之中容受無邊世界斯言有實耳此中坐禪證者之自知不由三乘之所說也經曰菩提之道不可圖度高而無上廣不可極淵而無下深不可測大苞天地細入無間故謂之道也所以法身清淨猶若虛空空亦無空有何得有有本不有人自著有空本不空人自著空離有離空清淨解脫無為無事無住無著寂滅之中一物不作斯乃菩提之道然涅槃之道果不在於有無之內亦不出於有無之外若如此者即入道之人不壞於有亦不損於無像法住持但假施設耳是故體空無相不可為有用之不廢不可為無則空而常用之而常空空用雖殊而無心可異即真如性淨常住不滅也余歎曰天下有不解修道者被有無繫然也有不自有緣未生時無有無不自無緣散之後故無有若本有有自常有不待緣而後有無若本無無自常無豈待緣盡後始無也緣有非是有真如之中有緣無非是無清淨心中無彼無也有無法妄想之域豈足以標聖道放光經云菩提從有得耶答曰不也從無得耶答曰不也從有無得耶答曰不也離有無得耶答曰不也是義云何得答曰無所得得無所得者謂之得菩提也
